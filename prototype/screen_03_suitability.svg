<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1560" width="760" height="1560">
  <defs>
    <clipPath id="frame">
      <rect x="20" y="20" width="720" height="1520" rx="50" />
    </clipPath>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000"/>
      <stop offset="1" stop-color="#222"/>
    </linearGradient>
  </defs>
  <!-- bezel -->
  <rect x="0" y="0" width="760" height="1560" rx="60" fill="url(#bezelGrad)"/>
  <!-- screen -->
  <rect x="20" y="20" width="720" height="1520" rx="50" fill="#FFFFFF"/>
  <g clip-path="url(#frame)">
    <!-- status bar -->
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" fill="#1A1A1A">
      <text x="80" y="74" font-size="22">9:41</text>
      <g transform="translate(580, 56)">
        <rect x="0" y="0" width="22" height="11" rx="2" fill="#1A1A1A"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#FFFFFF"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#1A1A1A"/>
        <rect x="25" y="4" width="2" height="4" rx="1" fill="#1A1A1A"/>
      </g>
      <text x="610" y="74" font-size="22">100%</text>
    </g>
    <!-- notch -->
    <rect x="285.0" y="34" width="190" height="34" rx="17" fill="#000"/>
    
  
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
      <path d="M 60 130 l -22 22 l 22 22" stroke="#1A1A1A" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="380.0" y="160" font-size="28" font-weight="700" fill="#1A1A1A" text-anchor="middle">A few quick questions</text>
      <text x="700" y="160" font-size="20" font-weight="600" fill="#EC111A" text-anchor="end" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Step 2 of 3</text>
    </g>

  <rect x="60" y="200" width="640" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="60" y="200" width="426" height="6" rx="3" fill="#EC111A"/>

  <text x="60" y="270" font-size="20" fill="#6B7280" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Question 3 of 5</text>

  <text x="60" y="340" font-size="36" font-weight="800" fill="#1A1A1A" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">If your investment dropped</text>
  <text x="60" y="386" font-size="36" font-weight="800" fill="#1A1A1A" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">20% next month,</text>
  <text x="60" y="432" font-size="36" font-weight="800" fill="#EC111A" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">what would you do?</text>

  <text x="60" y="490" font-size="18" fill="#6B7280" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">No wrong answer. We use this to recommend a portfolio that matches how you actually think.</text>

  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
    <rect x="60" y="600" width="640" height="140" rx="20" fill="white" stroke="#E5E7EB" stroke-width="2"/>
    <circle cx="105" cy="670" r="22" fill="white" stroke="#E5E7EB" stroke-width="3"/>
    <text x="155" y="660" font-size="22" font-weight="700" fill="#1A1A1A">Sell everything.</text>
    <text x="155" y="700" font-size="18" fill="#6B7280">Get out before it gets worse.</text>

    <rect x="60" y="760" width="640" height="140" rx="20" fill="white" stroke="#E5E7EB" stroke-width="2"/>
    <circle cx="105" cy="830" r="22" fill="white" stroke="#E5E7EB" stroke-width="3"/>
    <text x="155" y="820" font-size="22" font-weight="700" fill="#1A1A1A">Hold and wait.</text>
    <text x="155" y="860" font-size="18" fill="#6B7280">It will probably come back.</text>

    <rect x="60" y="920" width="640" height="140" rx="20" fill="white" stroke="#EC111A" stroke-width="4"/>
    <circle cx="105" cy="990" r="22" fill="#EC111A"/>
    <circle cx="105" cy="990" r="9" fill="white"/>
    <text x="155" y="980" font-size="22" font-weight="700" fill="#1A1A1A">Keep buying.</text>
    <text x="155" y="1020" font-size="18" fill="#6B7280">It is on sale.</text>

    <rect x="60" y="1080" width="640" height="140" rx="20" fill="white" stroke="#E5E7EB" stroke-width="2"/>
    <circle cx="105" cy="1150" r="22" fill="white" stroke="#E5E7EB" stroke-width="3"/>
    <text x="155" y="1140" font-size="22" font-weight="700" fill="#1A1A1A">Honestly, I do not know.</text>
    <text x="155" y="1180" font-size="18" fill="#6B7280">That is a normal answer.</text>
  </g>

  <rect x="60" y="1270" width="640" height="100" rx="50" fill="#EC111A"/>
  <text x="380.0" y="1332" font-size="26" font-weight="700" fill="white" text-anchor="middle" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Next</text>

    <!-- home indicator -->
    <rect x="310.0" y="1510" width="140" height="6" rx="3" fill="#1A1A1A" opacity="0.4"/>
  </g>
</svg>