<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1560" width="760" height="1560">
  <defs>
    <clipPath id="frame">
      <rect x="20" y="20" width="720" height="1520" rx="50" />
    </clipPath>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000"/>
      <stop offset="1" stop-color="#222"/>
    </linearGradient>
  </defs>
  <!-- bezel -->
  <rect x="0" y="0" width="760" height="1560" rx="60" fill="url(#bezelGrad)"/>
  <!-- screen -->
  <rect x="20" y="20" width="720" height="1520" rx="50" fill="#FFFFFF"/>
  <g clip-path="url(#frame)">
    <!-- status bar -->
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" fill="#1A1A1A">
      <text x="80" y="74" font-size="22">9:41</text>
      <g transform="translate(580, 56)">
        <rect x="0" y="0" width="22" height="11" rx="2" fill="#1A1A1A"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#FFFFFF"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#1A1A1A"/>
        <rect x="25" y="4" width="2" height="4" rx="1" fill="#1A1A1A"/>
      </g>
      <text x="610" y="74" font-size="22">100%</text>
    </g>
    <!-- notch -->
    <rect x="285.0" y="34" width="190" height="34" rx="17" fill="#000"/>
    
  
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
      
      <text x="380.0" y="160" font-size="28" font-weight="700" fill="#1A1A1A" text-anchor="middle">Learn</text>
      
    </g>

  <text x="60" y="220" font-size="34" font-weight="800" fill="#1A1A1A" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Five minutes,</text>
  <text x="60" y="265" font-size="34" font-weight="800" fill="#EC111A" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">five lessons.</text>

  <text x="60" y="310" font-size="18" fill="#6B7280" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Finish to unlock $25.</text>

  <rect x="60" y="360" width="640" height="140" rx="24" fill="white" stroke="#E5E7EB"/>
  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="90" y="405" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1">YOUR PROGRESS</text>
    <text x="90" y="445" font-size="26" font-weight="800" fill="#1A1A1A">3 of 5 lessons</text>
    <rect x="90" y="465" width="580" height="10" rx="5" fill="#E5E7EB"/>
    <rect x="90" y="465" width="348" height="10" rx="5" fill="#00875A"/>
  </g>

  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
    <rect x="60" y="540" width="640" height="110" rx="20" fill="white" stroke="#E5E7EB"/>
    <circle cx="115" cy="595" r="28" fill="#00875A" opacity="0.18"/>
    <path d="M 100 595 l 12 12 l 22 -22" stroke="#00875A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="170" y="585" font-size="20" font-weight="700" fill="#1A1A1A">What is a TFSA, really?</text>
    <text x="170" y="615" font-size="15" fill="#6B7280">1 min, in plain language</text>

    <rect x="60" y="670" width="640" height="110" rx="20" fill="white" stroke="#E5E7EB"/>
    <circle cx="115" cy="725" r="28" fill="#00875A" opacity="0.18"/>
    <path d="M 100 725 l 12 12 l 22 -22" stroke="#00875A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="170" y="715" font-size="20" font-weight="700" fill="#1A1A1A">FHSA vs TFSA vs RRSP</text>
    <text x="170" y="745" font-size="15" fill="#6B7280">2 min, which is right for you</text>

    <rect x="60" y="800" width="640" height="110" rx="20" fill="white" stroke="#E5E7EB"/>
    <circle cx="115" cy="855" r="28" fill="#00875A" opacity="0.18"/>
    <path d="M 100 855 l 12 12 l 22 -22" stroke="#00875A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="170" y="845" font-size="20" font-weight="700" fill="#1A1A1A">Why time matters more than money</text>
    <text x="170" y="875" font-size="15" fill="#6B7280">1 min, the compounding story</text>

    <rect x="60" y="930" width="640" height="110" rx="20" fill="white" stroke="#EC111A" stroke-width="3"/>
    <circle cx="115" cy="985" r="28" fill="#EC111A"/>
    <text x="115" y="998" font-size="28" font-weight="900" fill="white" text-anchor="middle">▶</text>
    <text x="170" y="975" font-size="20" font-weight="700" fill="#1A1A1A">What you actually own in a portfolio</text>
    <text x="170" y="1005" font-size="15" fill="#EC111A" font-weight="600">Continue, 1 min left</text>

    <rect x="60" y="1060" width="640" height="110" rx="20" fill="white" stroke="#E5E7EB"/>
    <circle cx="115" cy="1115" r="28" fill="#E5E7EB" opacity="0.5"/>
    <rect x="105" y="1108" width="20" height="14" rx="2" fill="none" stroke="#6B7280" stroke-width="3"/>
    <path d="M 109 1108 v -4 a 6 6 0 0 1 12 0 v 4" fill="none" stroke="#6B7280" stroke-width="3"/>
    <text x="170" y="1105" font-size="20" font-weight="700" fill="#6B7280">When markets drop, what really happens?</text>
    <text x="170" y="1135" font-size="15" fill="#6B7280">1 min, unlocks $25</text>
  </g>

  <rect x="60" y="1220" width="640" height="100" rx="20" fill="#EC111A"/>
  <text x="380.0" y="1262" font-size="18" font-weight="700" fill="white" text-anchor="middle" opacity="0.92" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">FINISH IN 2 MINUTES TO UNLOCK</text>
  <text x="380.0" y="1298" font-size="32" font-weight="900" fill="white" text-anchor="middle" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">$25</text>

    <!-- home indicator -->
    <rect x="310.0" y="1510" width="140" height="6" rx="3" fill="#1A1A1A" opacity="0.4"/>
  </g>
