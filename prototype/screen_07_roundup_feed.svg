<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1560" width="760" height="1560">
  <defs>
    <clipPath id="frame">
      <rect x="20" y="20" width="720" height="1520" rx="50" />
    </clipPath>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000"/>
      <stop offset="1" stop-color="#222"/>
    </linearGradient>
  </defs>
  <!-- bezel -->
  <rect x="0" y="0" width="760" height="1560" rx="60" fill="url(#bezelGrad)"/>
  <!-- screen -->
  <rect x="20" y="20" width="720" height="1520" rx="50" fill="#FFFFFF"/>
  <g clip-path="url(#frame)">
    <!-- status bar -->
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" fill="#1A1A1A">
      <text x="80" y="74" font-size="22">9:41</text>
      <g transform="translate(580, 56)">
        <rect x="0" y="0" width="22" height="11" rx="2" fill="#1A1A1A"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#FFFFFF"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#1A1A1A"/>
        <rect x="25" y="4" width="2" height="4" rx="1" fill="#1A1A1A"/>
      </g>
      <text x="610" y="74" font-size="22">100%</text>
    </g>
    <!-- notch -->
    <rect x="285.0" y="34" width="190" height="34" rx="17" fill="#000"/>
    
  
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
      <path d="M 60 130 l -22 22 l 22 22" stroke="#1A1A1A" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="380.0" y="160" font-size="28" font-weight="700" fill="#1A1A1A" text-anchor="middle">Round-ups</text>
      
    </g>

  <rect x="60" y="210" width="640" height="200" rx="24" fill="#2D3748"/>
  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" fill="white">
    <text x="90" y="260" font-size="14" font-weight="700" opacity="0.85" letter-spacing="1">THIS WEEK</text>
    <text x="90" y="330" font-size="62" font-weight="900">$3.47</text>
    <text x="90" y="370" font-size="18" font-weight="600" opacity="0.85">invested from spare change</text>
  </g>

  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
    <rect x="60" y="450" width="640" height="60" rx="30" fill="white" stroke="#E5E7EB"/>
    <rect x="64" y="454" width="210" height="52" rx="26" fill="#1A1A1A"/>
    <text x="166" y="488" font-size="18" font-weight="700" fill="white" text-anchor="middle">Week</text>
    <text x="380" y="488" font-size="18" font-weight="700" fill="#6B7280" text-anchor="middle">Month</text>
    <text x="593" y="488" font-size="18" font-weight="700" fill="#6B7280" text-anchor="middle">All time</text>
  </g>

  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="60" y="580" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1">TODAY</text>

    <g transform="translate(60, 610)">
      <rect x="0" y="0" width="60" height="60" rx="14" fill="#C8A24B" opacity="0.18"/>
      <text x="30" y="40" font-size="26" font-weight="700" fill="#C8A24B" text-anchor="middle">☕</text>
      <text x="80" y="25" font-size="20" font-weight="700" fill="#1A1A1A">Tim Hortons</text>
      <text x="80" y="50" font-size="15" fill="#6B7280">$4.87 rounded to $5.00</text>
      <text x="610" y="40" font-size="22" font-weight="800" fill="#00875A" text-anchor="end">+$0.13</text>
    </g>

    <g transform="translate(60, 700)">
      <rect x="0" y="0" width="60" height="60" rx="14" fill="#2D3748" opacity="0.15"/>
      <text x="30" y="40" font-size="22" font-weight="700" fill="#2D3748" text-anchor="middle">🚇</text>
      <text x="80" y="25" font-size="20" font-weight="700" fill="#1A1A1A">TTC Presto</text>
      <text x="80" y="50" font-size="15" fill="#6B7280">$3.35 rounded to $4.00</text>
      <text x="610" y="40" font-size="22" font-weight="800" fill="#00875A" text-anchor="end">+$0.65</text>
    </g>

    <text x="60" y="820" font-size="14" font-weight="700" fill="#6B7280" letter-spacing="1">YESTERDAY</text>

    <g transform="translate(60, 850)">
      <rect x="0" y="0" width="60" height="60" rx="14" fill="#EC111A" opacity="0.12"/>
      <text x="30" y="40" font-size="22" font-weight="700" fill="#EC111A" text-anchor="middle">📚</text>
      <text x="80" y="25" font-size="20" font-weight="700" fill="#1A1A1A">Indigo Books</text>
      <text x="80" y="50" font-size="15" fill="#6B7280">$22.41 rounded to $23.00</text>
      <text x="610" y="40" font-size="22" font-weight="800" fill="#00875A" text-anchor="end">+$0.59</text>
    </g>

    <g transform="translate(60, 940)">
      <rect x="0" y="0" width="60" height="60" rx="14" fill="#00875A" opacity="0.15"/>
      <text x="30" y="40" font-size="22" font-weight="700" fill="#00875A" text-anchor="middle">🛒</text>
      <text x="80" y="25" font-size="20" font-weight="700" fill="#1A1A1A">Loblaws</text>
      <text x="80" y="50" font-size="15" fill="#6B7280">$47.62 rounded to $48.00</text>
      <text x="610" y="40" font-size="22" font-weight="800" fill="#00875A" text-anchor="end">+$0.38</text>
    </g>

    <g transform="translate(60, 1030)">
      <rect x="0" y="0" width="60" height="60" rx="14" fill="#C8A24B" opacity="0.18"/>
      <text x="30" y="40" font-size="22" font-weight="700" fill="#C8A24B" text-anchor="middle">🎬</text>
      <text x="80" y="25" font-size="20" font-weight="700" fill="#1A1A1A">Cineplex</text>
      <text x="80" y="50" font-size="15" fill="#6B7280">$14.25 rounded to $15.00</text>
      <text x="610" y="40" font-size="22" font-weight="800" fill="#00875A" text-anchor="end">+$0.75</text>
    </g>
