  <rect x="60" y="1170" width="640" height="120" rx="20" fill="#EC111A" opacity="0.08"/>
  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="90" y="1210" font-size="14" font-weight="700" fill="#EC111A" letter-spacing="1">SCOTIA BONUS</text>
    <text x="90" y="1245" font-size="20" font-weight="700" fill="#1A1A1A">Plus 2¢ per purchase, on us.</text>
    <text x="90" y="1273" font-size="16" fill="#6B7280">Up to $50 over the 2-year program.</text>
  </g>

  <text x="60" y="1370" font-size="16" fill="#6B7280" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Settings, Pause round-ups</text>

    <!-- home indicator -->
    <rect x="310.0" y="1510" width="140" height="6" rx="3" fill="#1A1A1A" opacity="0.4"/>
  </g>
</svg>