<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1560" width="760" height="1560">
  <defs>
    <clipPath id="frame">
      <rect x="20" y="20" width="720" height="1520" rx="50" />
    </clipPath>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000"/>
      <stop offset="1" stop-color="#222"/>
    </linearGradient>
  </defs>
  <!-- bezel -->
  <rect x="0" y="0" width="760" height="1560" rx="60" fill="url(#bezelGrad)"/>
  <!-- screen -->
  <rect x="20" y="20" width="720" height="1520" rx="50" fill="#FFFFFF"/>
  <g clip-path="url(#frame)">
    <!-- status bar -->
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" fill="#1A1A1A">
      <text x="80" y="74" font-size="22">9:41</text>
      <g transform="translate(580, 56)">
        <rect x="0" y="0" width="22" height="11" rx="2" fill="#1A1A1A"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#FFFFFF"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#1A1A1A"/>
        <rect x="25" y="4" width="2" height="4" rx="1" fill="#1A1A1A"/>
      </g>
      <text x="610" y="74" font-size="22">100%</text>
    </g>
    <!-- notch -->
    <rect x="285.0" y="34" width="190" height="34" rx="17" fill="#000"/>
    
  
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
      <path d="M 60 130 l -22 22 l 22 22" stroke="#1A1A1A" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="380.0" y="160" font-size="28" font-weight="700" fill="#1A1A1A" text-anchor="middle">We already know you</text>
      <text x="700" y="160" font-size="20" font-weight="600" fill="#EC111A" text-anchor="end" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Step 1 of 3</text>
    </g>

  <rect x="60" y="200" width="640" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="60" y="200" width="213" height="6" rx="3" fill="#EC111A"/>

  <text x="60" y="270" font-size="24" font-weight="600" fill="#1A1A1A" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Confirm the info we have on file.</text>
  <text x="60" y="305" font-size="18" fill="#6B7280" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">From your existing Scotia chequing account.</text>

  <rect x="60" y="350" width="640" height="700" rx="24" fill="white" stroke="#E5E7EB"/>

  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="100" y="410" font-size="16" fill="#6B7280">Legal name</text>
    <text x="100" y="445" font-size="22" font-weight="600" fill="#1A1A1A">Miller Chen</text>
    <circle cx="650" cy="425" r="18" fill="#00875A" opacity="0.15"/>
    <path d="M 638 425 l 8 8 l 14 -14" stroke="#00875A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="100" y1="490" x2="660" y2="490" stroke="#E5E7EB"/>

    <text x="100" y="530" font-size="16" fill="#6B7280">Date of birth</text>
    <text x="100" y="565" font-size="22" font-weight="600" fill="#1A1A1A">March 14, 2004</text>
    <circle cx="650" cy="545" r="18" fill="#00875A" opacity="0.15"/>
    <path d="M 638 545 l 8 8 l 14 -14" stroke="#00875A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="100" y1="610" x2="660" y2="610" stroke="#E5E7EB"/>

    <text x="100" y="650" font-size="16" fill="#6B7280">SIN</text>
    <text x="100" y="685" font-size="22" font-weight="600" fill="#1A1A1A">●●● ●●● 421</text>
    <circle cx="650" cy="665" r="18" fill="#00875A" opacity="0.15"/>
    <path d="M 638 665 l 8 8 l 14 -14" stroke="#00875A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="100" y1="730" x2="660" y2="730" stroke="#E5E7EB"/>

    <text x="100" y="770" font-size="16" fill="#6B7280">Address</text>
    <text x="100" y="805" font-size="22" font-weight="600" fill="#1A1A1A">221 Bay St, Toronto ON</text>
    <circle cx="650" cy="785" r="18" fill="#00875A" opacity="0.15"/>
    <path d="M 638 785 l 8 8 l 14 -14" stroke="#00875A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="100" y1="850" x2="660" y2="850" stroke="#E5E7EB"/>

    <text x="100" y="890" font-size="16" fill="#6B7280">Employment</text>
    <text x="100" y="925" font-size="22" font-weight="600" fill="#1A1A1A">Student, Ryerson University</text>
    <circle cx="650" cy="905" r="18" fill="#00875A" opacity="0.15"/>
    <path d="M 638 905 l 8 8 l 14 -14" stroke="#00875A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="100" y1="970" x2="660" y2="970" stroke="#E5E7EB"/>

    <text x="100" y="1010" font-size="16" fill="#6B7280">Annual income</text>
    <text x="100" y="1045" font-size="22" font-weight="600" fill="#1A1A1A">Under $25,000</text>
  </g>

  <text x="60" y="1110" font-size="16" fill="#6B7280" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Re-used under FINTRAC identity verification.</text>
  <text x="60" y="1136" font-size="16" fill="#6B7280" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">No new ID upload needed.</text>

  <rect x="60" y="1200" width="640" height="100" rx="50" fill="#EC111A"/>
  <text x="380.0" y="1262" font-size="26" font-weight="700" fill="white" text-anchor="middle" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Confirm and continue</text>

  <text x="380.0" y="1370" font-size="20" font-weight="600" fill="#6B7280" text-anchor="middle" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Need to update something? Edit</text>

    <!-- home indicator -->
    <rect x="310.0" y="1510" width="140" height="6" rx="3" fill="#1A1A1A" opacity="0.4"/>
  </g>
</svg>