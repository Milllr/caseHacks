<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1560" width="760" height="1560">
  <defs>
    <clipPath id="frame">
      <rect x="20" y="20" width="720" height="1520" rx="50" />
    </clipPath>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000"/>
      <stop offset="1" stop-color="#222"/>
    </linearGradient>
  </defs>
  <!-- bezel -->
  <rect x="0" y="0" width="760" height="1560" rx="60" fill="url(#bezelGrad)"/>
  <!-- screen -->
  <rect x="20" y="20" width="720" height="1520" rx="50" fill="#FFFFFF"/>
  <g clip-path="url(#frame)">
    <!-- status bar -->
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" fill="#1A1A1A">
      <text x="80" y="74" font-size="22">9:41</text>
      <g transform="translate(580, 56)">
        <rect x="0" y="0" width="22" height="11" rx="2" fill="#1A1A1A"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#FFFFFF"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#1A1A1A"/>
        <rect x="25" y="4" width="2" height="4" rx="1" fill="#1A1A1A"/>
      </g>
      <text x="610" y="74" font-size="22">100%</text>
    </g>
    <!-- notch -->
    <rect x="285.0" y="34" width="190" height="34" rx="17" fill="#000"/>
    
  <defs>
    <linearGradient id="celebGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EC111A"/>
      <stop offset="1" stop-color="#B40005"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="720" height="1520" rx="50" fill="url(#celebGrad)"/>

  <!-- confetti -->
  <g opacity="0.85">
    <circle cx="140" cy="280" r="8" fill="#C8A24B"/>
    <circle cx="280" cy="200" r="6" fill="white"/>
    <circle cx="550" cy="260" r="10" fill="#C8A24B"/>
    <circle cx="640" cy="180" r="7" fill="white"/>
    <rect x="200" y="320" width="14" height="14" fill="white" transform="rotate(20 207 327)"/>
    <rect x="500" y="340" width="14" height="14" fill="#C8A24B" transform="rotate(-15 507 347)"/>
    <rect x="120" y="450" width="12" height="12" fill="white" transform="rotate(30 126 456)"/>
    <rect x="600" y="500" width="12" height="12" fill="#C8A24B" transform="rotate(45 606 506)"/>
    <circle cx="100" cy="600" r="5" fill="white"/>
    <circle cx="680" cy="640" r="6" fill="#C8A24B"/>
    <rect x="350" y="280" width="10" height="10" fill="#C8A24B"/>
    <rect x="240" y="540" width="10" height="10" fill="white"/>
  </g>

  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" fill="white" text-anchor="middle">
    <text x="380.0" y="200" font-size="22" font-weight="600" opacity="0.85">Welcome to ScotiaSeed</text>
    <text x="380.0" y="640" font-size="200" font-weight="900">$25</text>
    <text x="380.0" y="710" font-size="34" font-weight="700">unlocked</text>
  </g>

  <rect x="60" y="800" width="640" height="380" rx="24" fill="white"/>
  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="380.0" y="860" font-size="22" font-weight="700" fill="#1A1A1A" text-anchor="middle">Here is where it is going</text>

    <rect x="100" y="900" width="80" height="80" rx="40" fill="#EC111A" opacity="0.1"/>
    <text x="140" y="958" font-size="44" font-weight="900" fill="#EC111A" text-anchor="middle" font-family="'ITC Century', Cambria, Georgia, serif">S</text>

    <text x="210" y="935" font-size="22" font-weight="700" fill="#1A1A1A">Your new FHSA</text>
    <text x="210" y="965" font-size="18" fill="#6B7280">Scotia Essentials Portfolio</text>
    <text x="210" y="990" font-size="16" fill="#6B7280">Balanced growth, 0.65% MER</text>

    <line x1="100" y1="1030" x2="660" y2="1030" stroke="#E5E7EB"/>

    <text x="100" y="1075" font-size="16" font-weight="600" fill="#6B7280">NEXT</text>
    <text x="100" y="1115" font-size="22" font-weight="700" fill="#1A1A1A">Set a monthly contribution</text>
    <text x="100" y="1145" font-size="18" fill="#6B7280">Unlock another $50 in 3 months.</text>
  </g>

  <rect x="60" y="1240" width="640" height="100" rx="50" fill="white"/>
  <text x="380.0" y="1302" font-size="26" font-weight="700" fill="#EC111A" text-anchor="middle" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Set up auto-contribute</text>

  <text x="380.0" y="1410" font-size="18" font-weight="600" fill="white" text-anchor="middle" opacity="0.85" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Skip for now</text>

    <!-- home indicator -->
    <rect x="310.0" y="1510" width="140" height="6" rx="3" fill="#1A1A1A" opacity="0.4"/>
  </g>
</svg>