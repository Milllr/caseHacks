<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1560" width="760" height="1560">
  <defs>
    <clipPath id="frame">
      <rect x="20" y="20" width="720" height="1520" rx="50" />
    </clipPath>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000"/>
      <stop offset="1" stop-color="#222"/>
    </linearGradient>
  </defs>
  <!-- bezel -->
  <rect x="0" y="0" width="760" height="1560" rx="60" fill="url(#bezelGrad)"/>
  <!-- screen -->
  <rect x="20" y="20" width="720" height="1520" rx="50" fill="#FFFFFF"/>
  <g clip-path="url(#frame)">
    <!-- status bar -->
    <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" fill="#1A1A1A">
      <text x="80" y="74" font-size="22">9:41</text>
      <g transform="translate(580, 56)">
        <rect x="0" y="0" width="22" height="11" rx="2" fill="#1A1A1A"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#FFFFFF"/>
        <rect x="3" y="2" width="16" height="7" rx="1" fill="#1A1A1A"/>
        <rect x="25" y="4" width="2" height="4" rx="1" fill="#1A1A1A"/>
      </g>
      <text x="610" y="74" font-size="22">100%</text>
    </g>
    <!-- notch -->
    <rect x="285.0" y="34" width="190" height="34" rx="17" fill="#000"/>
    
  <!-- Top brand band, Scotia Red -->
  <rect x="20" y="110" width="720" height="540" fill="#EC111A"/>
  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" fill="white">
    <!-- Flying S approximation: white circle with red S -->
    <circle cx="380.0" cy="260" r="68" fill="white"/>
    <text x="380.0" y="296" font-size="100" font-weight="900" fill="#EC111A" text-anchor="middle" font-family="'ITC Century', Cambria, Georgia, serif">S</text>
    <text x="380.0" y="408" font-size="44" font-weight="800" text-anchor="middle">ScotiaSeed</text>
    <text x="380.0" y="452" font-size="20" font-weight="500" text-anchor="middle" opacity="0.92">From the bank that already knows you</text>
  </g>

  <!-- Headline -->
  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#1A1A1A">
    <text x="60" y="760" font-size="46" font-weight="800">You already bank</text>
    <text x="60" y="816" font-size="46" font-weight="800">with us.</text>
    <text x="60" y="900" font-size="32" font-weight="600" fill="#EC111A">Investing should be</text>
    <text x="60" y="942" font-size="32" font-weight="600" fill="#EC111A">one tap away.</text>
  </g>

  <!-- Value props -->
  <g font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif" fill="#1A1A1A">
    <g transform="translate(60, 1020)">
      <circle cx="22" cy="22" r="22" fill="#00875A" opacity="0.15"/>
      <path d="M 12 22 l 8 8 l 16 -16" stroke="#00875A" stroke-width="4" fill="none" stroke-linecap="round"/>
      <text x="68" y="30" font-size="22" font-weight="600">$25 to start. On us.</text>
    </g>
    <g transform="translate(60, 1080)">
      <circle cx="22" cy="22" r="22" fill="#00875A" opacity="0.15"/>
      <path d="M 12 22 l 8 8 l 16 -16" stroke="#00875A" stroke-width="4" fill="none" stroke-linecap="round"/>
      <text x="68" y="30" font-size="22" font-weight="600">Up to $300 matched over 2 years.</text>
    </g>
    <g transform="translate(60, 1140)">
      <circle cx="22" cy="22" r="22" fill="#00875A" opacity="0.15"/>
      <path d="M 12 22 l 8 8 l 16 -16" stroke="#00875A" stroke-width="4" fill="none" stroke-linecap="round"/>
      <text x="68" y="30" font-size="22" font-weight="600">No new signup. No new app.</text>
    </g>
  </g>

  <!-- CTA -->
  <rect x="60" y="1280" width="640" height="100" rx="50" fill="#EC111A"/>
  <text x="380.0" y="1342" font-size="28" font-weight="700" fill="white" text-anchor="middle" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Open in 60 seconds</text>
  <text x="380.0" y="1430" font-size="18" font-weight="500" fill="#6B7280" text-anchor="middle" font-family="Frutiger, 'Segoe UI', Helvetica, Arial, sans-serif">Already a Scotiabank customer? You are ready.</text>

    <!-- home indicator -->
    <rect x="310.0" y="1510" width="140" height="6" rx="3" fill="#1A1A1A" opacity="0.4"/>
  </g>
</svg>